<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Chat App</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 480px;
      height: 600px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 15px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 16px;
    }
    .header-info h2 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .status {
      font-size: 12px;
      opacity: 0.9;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      background: #4ade80;
      border-radius: 50%;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .message {
      display: flex;
      gap: 8px;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .message.sent {
      justify-content: flex-end;
      flex-direction: row-reverse;
    }
    .message-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
      color: #666;
      flex-shrink: 0;
    }
    .message.sent .message-avatar {
      background: #667eea;
      color: white;
    }
    .bubble {
      max-width: 70%;
      padding: 10px 14px;
      border-radius: 12px;
      word-wrap: break-word;
      font-size: 14px;
      line-height: 1.4;
    }
    .message.received .bubble {
      background: #f0f0f0;
      color: #333;
      border-radius: 0px 12px 12px 12px;
    }
    .message.sent .bubble {
      background: #667eea;
      color: white;
      border-radius: 12px 0px 12px 12px;
    }
    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 10px 14px;
    }
    .typing-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #999;
      animation: bounce 1.4s infinite;
    }
    .typing-dot:nth-child(2) {
      animation-delay: 0.2s;
    }
    .typing-dot:nth-child(3) {
      animation-delay: 0.4s;
    }
    @keyframes bounce {
      0%, 60%, 100% {
        opacity: 0.7;
        transform: translateY(0);
      }
      30% {
        opacity: 1;
        transform: translateY(-10px);
      }
    }
    .quick-replies {
      display: flex;
      gap: 8px;
      padding: 8px 20px 0;
      flex-wrap: wrap;
    }
    .quick-btn {
      padding: 6px 12px;
      background: #f0f0f0;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 12px;
      color: #666;
      transition: all 0.2s;
    }
    .quick-btn:hover {
      background: #e0e0e0;
      transform: scale(1.05);
    }
    .input-area {
      display: flex;
      gap: 10px;
      padding: 12px 20px;
      border-top: 1px solid #e0e0e0;
      background: white;
      align-items: flex-end;
    }
    .input-area textarea {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 20px;
      padding: 8px 14px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      max-height: 100px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-area textarea:focus {
      border-color: #667eea;
    }
    .send-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #667eea;
      border: none;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .send-btn:hover {
      background: #764ba2;
      transform: scale(1.05);
    }
    .send-btn:active {
      transform: scale(0.95);
    }
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }
    ::-webkit-scrollbar-thumb {
      background: #ccc;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #999;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="avatar">AJ</div>
      <div class="header-info">
        <h2>Alex Johnson</h2>
        <div class="status">
          <span class="status-dot"></span>
          <span>Online</span>
        </div>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="message received">
        <div class="message-avatar">AJ</div>
        <div class="bubble">Hey! How's it going? 👋</div>
      </div>
      <div class="message sent">
        <div class="message-avatar">Me</div>
        <div class="bubble">All good! Just testing this chat app 😄</div>
      </div>
      <div class="message received">
        <div class="message-avatar">AJ</div>
        <div class="bubble">Nice! It looks really clean. Try sending a message!</div>
      </div>
    </div>

    <div class="quick-replies">
      <button class="quick-btn" onclick="sendQuick('👍 Sounds good!')">👍 Sounds good!</button>
      <button class="quick-btn" onclick="sendQuick('Thanks!')">Thanks!</button>
      <button class="quick-btn" onclick="sendQuick('On my way 🚶')">On my way 🚶</button>
      <button class="quick-btn" onclick="sendQuick('Haha 😄')">Haha 😄</button>
    </div>

    <div class="input-area">
      <textarea id="input" placeholder="Type a message..." rows="1"></textarea>
      <button class="send-btn" onclick="sendMessage()">
        <i class="fas fa-paper-plane"></i>
      </button>
    </div>
  </div>

  <script>
    const replies = [
      "That's awesome! 😄",
      "Haha, totally agree!",
      "Let me think about that...",
      "Good point! 👌",
      "No way! Really?",
      "Sounds great to me!",
      "Yeah, makes sense!",
      "Cool cool cool 😎",
      "Interesting... tell me more!",
      "lol same 😂",
      "You're right!",
      "For sure! 🎉"
    ];

    let replyIndex = 0;
    const messagesDiv = document.getElementById('messages');
    const inputField = document.getElementById('input');

    function addMessage(text, isOwn = false) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${isOwn ? 'sent' : 'received'}`;
      
      const avatarDiv = document.createElement('div');
      avatarDiv.className = 'message-avatar';
      avatarDiv.textContent = isOwn ? 'Me' : 'AJ';
      
      const bubbleDiv = document.createElement('div');
      bubbleDiv.className = 'bubble';
      bubbleDiv.textContent = text;
      
      messageDiv.appendChild(avatarDiv);
      messageDiv.appendChild(bubbleDiv);
      messagesDiv.appendChild(messageDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function showTyping() {
      const messageDiv = document.createElement('div');
      messageDiv.className = 'message received';
      messageDiv.id = 'typing';
      
      const avatarDiv = document.createElement('div');
      avatarDiv.className = 'message-avatar';
      avatarDiv.textContent = 'AJ';
      
      const bubbleDiv = document.createElement('div');
      bubbleDiv.className = 'bubble typing-indicator';
      bubbleDiv.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
      
      messageDiv.appendChild(avatarDiv);
      messageDiv.appendChild(bubbleDiv);
      messagesDiv.appendChild(messageDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function removeTyping() {
      const typing = document.getElementById('typing');
      if (typing) typing.remove();
    }

    function sendMessage() {
      const text = inputField.value.trim();
      if (!text) return;

      addMessage(text, true);
      inputField.value = '';
      inputField.style.height = 'auto';

      showTyping();
      setTimeout(() => {
        removeTyping();
        const response = replies[replyIndex % replies.length];
        addMessage(response, false);
        replyIndex++;
      }, 800 + Math.random() * 400);
    }

    function sendQuick(text) {
      addMessage(text, true);
      showTyping();
      setTimeout(() => {
        removeTyping();
        const response = replies[replyIndex % replies.length];
        addMessage(response, false);
        replyIndex++;
      }, 800 + Math.random() * 400);
    }

    // Auto-resize textarea
    inputField.addEventListener('input', () => {
      inputField.style.height = 'auto';
      inputField.style.height = Math.min(inputField.scrollHeight, 100) + 'px';
    });

    // Send on Enter
    inputField.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
